1) Quintomt theory:  G_2 -> X -V(phi),  
                         G_4 -> M_p^2/2 (1 + x phi^2)
                         
   Monomial potential:   V -> V0 + beta chi + m^2 chi^2
   Notes:  - small phi_ini fails to get enough Omega_DE
           - phi_prime_ini -> 0 causes an artificial instability (alpha_k->0)
             need to set small value or use a_min_stability_test_smg
   
gravity_model = quintom 
gravity_submodel = quintom_shift_alpha
M_pl_today_smg = -1
use_pert_var_deltaphi_smg = yes



#V0, beta, m2, lambda, alpha, phi_s, xi, phi0, dphi0


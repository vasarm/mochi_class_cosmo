# V(phi) = V0 + beta * phi + m2/2 * phi^2 + lambda/4 phi^4

# phi_s ~ 0


# For these parameters phi_s_smg -> 1.00156 when alpha = 1
V0_smg = 6.141663 # 
beta_smg = 0
m2_smg = -11.403525	
mu_smg = 0.
lambda_smg = 1.489941


#M_pl_tuning_smg = yes


# Non minimal coupling function: G4 = 1/2 * (alpha + xi phi^2)
# alpha_smg = 1.134110 # Can be ignored for the moment
alpha_smg = 1.
phi_s_smg = 0.0
xi_smg = -10.947763


# Initial conditions for the scalar field
phi0_smg = 0.
dphi0_smg = 1e-4

